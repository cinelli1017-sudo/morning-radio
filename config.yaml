# =====================================================================
# モーニングラジオの設定ファイル
#
# 番組名や声、ニュースの取得元(RSSフィード)などを、
# プログラム本体を書き換えずにここで変更できるようにしている。
# =====================================================================

# --- 番組の基本情報 ---------------------------------------------------
program:
  title: "モーニング調達ラジオ"
  # VOICEVOXの利用規約により、使用キャラクターのクレジット表記を含めている
  description: "生産設備メーカーの購買担当者向けに、前日のニュースを2人のパーソナリティがラジオ風にお届けする自分専用番組(音声: VOICEVOX:青山龍星、VOICEVOX:春日部つむぎ)"
  author: "morning-radio bot"
  language: "ja"
  # 番組全体の目安の長さ(分)。台本生成時にClaudeへ伝える
  target_minutes: 7

# --- 配信URL ----------------------------------------------------------
# GitHub Actions上では、リポジトリ名から自動で
# 「https://<ユーザー名>.github.io/<リポジトリ名>」を組み立てるため空でよい。
# ローカルテストや、独自ドメインで配信したい場合だけここに書く。
base_url: ""

# --- エピソードの保持期間 ----------------------------------------------
# この日数より古いMP3はフィードから外し、ファイルも削除する
# (GitHub Pagesの容量を使いすぎないようにするため)
retention_days: 14

# --- Claude API(台本生成) --------------------------------------------
claude:
  # 毎日実行するためコストを抑えたSonnetを既定にしている。
  # もっと凝った台本にしたい場合は claude-opus-4-8 などに変更できる
  model: "claude-sonnet-5"
  # 台本+モデルの内部思考(thinking)の合計上限。少なめだと台本が途中で切れるため余裕を持たせる
  max_tokens: 16000

# --- 音声合成(TTS) ---------------------------------------------------
tts:
  # 使うエンジン: "voicevox"(無料・キャラクター音声) または "edge-tts"(切り戻し用)
  engine: "voicevox"

  # VOICEVOXの設定。speakersの番号は声の種類(スタイルID)。
  # 声の一覧と試聴: https://voicevox.hiroshiba.jp
  # 番号の確認: エンジン起動中に http://127.0.0.1:50021/speakers を開く
  voicevox:
    url: "http://127.0.0.1:50021"
    speakers:
      male: 13    # 青山龍星(ノーマル): 低めの落ち着いた声
      female: 8   # 春日部つむぎ(ノーマル): 明るめで聞き取りやすい声
    # 読み上げ速度。1.0が標準。ニュースは少し速めがテンポよく聞こえる
    speed: 1.1

  # edge-ttsの設定(engine: "edge-tts" にしたときに使われる)
  edge_tts:
    voices:
      male: "ja-JP-KeitaNeural"
      female: "ja-JP-NanamiNeural"

# --- ニュース収集 ------------------------------------------------------
news:
  # 何時間前までの記事を「前日のニュース」として拾うか。
  # 24時間ちょうどだと実行時刻のズレで取りこぼすため、少し余裕を持たせている
  hours: 26
  # 1ジャンルあたり台本に渡す記事数の上限(多すぎると番組に収まらないため)
  max_items_per_genre: 8
  feeds:
    - genre: "経済・ビジネス"
      name: "NHK 経済ニュース"
      url: "https://www.nhk.or.jp/rss/news/cat5.xml"
    - genre: "国内一般"
      name: "NHK 主要ニュース"
      url: "https://www.nhk.or.jp/rss/news/cat0.xml"
    - genre: "製造業・FA"
      name: "MONOist"
      url: "https://rss.itmedia.co.jp/rss/2.0/monoist.xml"
    - genre: "製造業・FA"
      name: "日経クロステック"
      url: "https://xtech.nikkei.com/rss/index.rdf"
    - genre: "IT"
      name: "ITmedia NEWS"
      url: "https://rss.itmedia.co.jp/rss/2.0/news_bursts.xml"
